<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <meta>
</head>

<body>
    <header class="flex">
        <div class="container flex">
            <img src="./assets/LOGO.png" />

            <div class="subHeader flex">
                <a href="#">Company</a>
                <a href="#">Services</a>
                <a href="#">FinTech Solutions</a>
                <a href="#">Products</a>
                <a href="#">Portfolio</a>
                <a href="/index.html" class="active"><span>Contact us</span>
                </a>
            </div>
        </div>
    </header>
    <section class="container">
        <div class="section1">
            <h1 class="headerContent">Contact us</h1>
            <p class="subHeaderContent">Need an experienced and skilled hand with custom IT projects?
                Fill out the form to get a free consultation.</p>
            <form>
                <input type="text" placeholder="Your Comoany Name" name="Name" class="addDarkColor" />
                <input type="text" placeholder="Nature of Bussiness" name="Bussiness" />
                <div class="towInputs">
                    <input type="text" placeholder="Address" name="Address" />
                    <input type="text" placeholder="Postcode" name="Postcode" />
                </div>
                <input type="text" placeholder="Contact name" name="Contact_name" />
                <input type="text" placeholder="Contact Phone" name="Phone" />
                <input type="email" placeholder="email@gmail" name="gmail" class="addDarkColor" />
                <input type="text" placeholder="Linkedin" name="linkedin" />
                <input type="text" placeholder="Let’s talk about your idea" name="idea" />
                <div class="upload-container">
                    <input type="file" id="myfile" hidden>

                    <label for="myfile" class="upload-box">
                        <i data-lucide="upload"></i>
                        <span>Upload Additional file</span>
                    </label>

                    <p class="upload-note">
                        Attach file. File size of your documents should not exceed 10MB
                    </p>
                </div>
            </form>
            <button>
                SUBMIT
            </button>
            <div class="CheckBox">
                <input type="checkbox" />
                <p>I want to protect my data by signing an NDA</p>
            </div>

        </div>
        <div class="section2">
         
        </div>
    </section>
    <script src="./index.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        lucide.createIcons();
    </script>
</body>

</html>
